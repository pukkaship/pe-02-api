name: AI PR review

# Best-effort reviewer. It posts a READY / NEEDS CHANGES verdict as a PR comment but does NOT
# block merge (the enforced gate is the CI job). If GEMINI_API_KEY is absent, it no-ops.

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
      - name: Run reviewer
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_BODY: ${{ github.event.pull_request.body }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: node scripts/gemini_pr_review.cjs
