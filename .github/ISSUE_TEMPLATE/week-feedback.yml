name: Module feedback
description: Tell us what broke unexpectedly or where you got stuck (5 minutes).
title: "[Module 2 feedback] "
labels: ["feedback"]
body:
  - type: input
    id: module
    attributes:
      label: Which module
      value: "Module 2 — pe-02-api"
    validations:
      required: true
  - type: textarea
    id: unexpected
    attributes:
      label: One thing that broke unexpectedly
      description: NOT an intentional bug — something the repo itself should not have done (setup, CI, README).
    validations:
      required: false
  - type: textarea
    id: discovery
    attributes:
      label: How did the discovery bug (Bug 3) go?
      description: Did the "green test that lies" click, or was it frustrating? What finally made it land?
    validations:
      required: false
  - type: textarea
    id: stuck
    attributes:
      label: Where did you hit the 4-hour stuck threshold (if you did)?
    validations:
      required: false
  - type: dropdown
    id: ai-review
    attributes:
      label: Was the AI PR review comment useful?
      options:
        - "Useful and specific"
        - "Generic / not helpful"
        - "I did not see one"
    validations:
      required: false
